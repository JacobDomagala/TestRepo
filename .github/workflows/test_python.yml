name: Test

on:
  push:
    branches:
      - develop
      - master
      - main

  pull_request_target:
    branches:
      - "*"

jobs:
  static_analysis:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Run static analysis Python
      uses: JacobDomagala/StaticAnalysis@150-investigate-ci-errors-on-master
      with:
        comment_title: "Python"
        verbose: true
        language: Python
        python_dirs: .
